<!DOCTYPE html>
<html>
<head>
    <title>NOP Dashboard</title>
    <script src="https://static.zohocdn.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        select { padding: 5px; }
    </style>
</head>
<body>
<div class="card">
    <h2>🚀 NOP Dashboard</h2>

    <div class="filters">
        <select><option>Type</option></select>
        <select><option>Year</option></select>
        <select><option>Month</option></select>
        <select><option>Week</option></select>
        <select><option>Date</option></select>
        <select><option>Nutritionist</option></select>
    </div>

    <div id="content">
        <p>Loading...</p>
    </div>
</div>

<script>
ZOHO.CREATOR.DATA.getRecords({
    app_name: "nop-sales-summary",
    report_name: "Sales_Summary_Report"
})
.then(function(response) {
    console.log("SUCCESS:", response);

    const records = response.data || [];

    let totalSales = 0;
    let totalNetSales = 0;
    let totalCommission = 0;

    records.forEach(function(row) {
        totalSales += parseFloat(row["Total_Sales"] || 0);
        totalNetSales += parseFloat(row["Total_Net_Sales"] || 0);
        totalCommission += parseFloat(row["Total_Commission"] || 0);
    });

    document.getElementById("content").innerHTML = `
        <div style="display:flex; gap:15px; margin-top:20px; flex-wrap:wrap;">
            <div style="background:#f5f7ff; padding:15px; border-radius:10px; min-width:220px;">
                <h3>Total Sales</h3>
                <p style="font-size:22px; font-weight:bold;">${totalSales.toLocaleString()}</p>
            </div>
            <div style="background:#f5f7ff; padding:15px; border-radius:10px; min-width:220px;">
                <h3>Total Net Sales</h3>
                <p style="font-size:22px; font-weight:bold;">${totalNetSales.toLocaleString()}</p>
            </div>
            <div style="background:#f5f7ff; padding:15px; border-radius:10px; min-width:220px;">
                <h3>Total Commission</h3>
                <p style="font-size:22px; font-weight:bold;">${totalCommission.toLocaleString()}</p>
            </div>
        </div>
    `;
})
.catch(function(error) {
    console.log("ERROR:", error);
    document.getElementById("content").innerHTML =
        "Error: " + JSON.stringify(error);
});
</script>


</body>
</html>
