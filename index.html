<!DOCTYPE html>
<html>
<head>
    <title>NOP Dashboard</title>
    <script src="https://static.zohocdn.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 18px;
            font-family: "Courier New", monospace;
            color: #3f7f9f;
            background: transparent;
        }
        .dashboard-card {
            background: #edf7fb;
            border: 1px solid #cfe5ee;
            border-radius: 16px;
            padding: 24px;
            box-shadow: none;
        }
        h2 {
            margin: 0 0 8px;
            font-size: 32px;
            color: #215c78;
        }
        .subtitle {
            margin: 0 0 20px;
            color: #5f97ae;
            font-size: 14px;
        }
        .filters-wrap {
            display: flex;
            flex-wrap: nowrap;     /* ❗ prevents line break */
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;      /* enables scroll if needed */
        }
        
        select, input[type="date"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cfd8e6;
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
        }

        .action-btn {
            padding: 10px 16px;
            border: 1px solid #cfd8e6;
            border-radius: 10px;
            background: #ffffff;
            color: #215c78;
            font-size: 14px;
            font-family: "Courier New", monospace;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: #eef7fb;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(4, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 22px;
        }
        .mini-card {
            background: #eef7fb;
            border: 1px solid #d7e9f1;
            border-radius: 14px;
            padding: 16px;
        }
        .mini-card .label {
            color: #5f97ae;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .mini-card .value {
            color: #215c78;
            font-size: 26px;
            font-weight: 700;
            white-space: nowrap;
        }
        .section { margin-top: 20px; }
        .section h3 {
            margin: 0 0 12px;
            font-size: 20px;
            color: #14233c;
        }
        .table-wrap {
            overflow-x: auto;
            border: 1px solid #e3eaf6;
            border-radius: 14px;
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
        }
        th {
            background: #dff1f7;
            color: #215c78;
            font-size: 14px;
            font-weight: 700;
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid #cfe5ee;
        }
        td {
            padding: 11px 10px;
            font-size: 14px;
            color: #4b8aa6;
            border-bottom: 1px solid #dcecf3;
        }
        th.number, td.number { text-align: right; white-space: nowrap; }
        tr.total-row td {
            font-weight: 700;
            background: #f8f1bf;
            color: #215c78;
        }
        .empty, .loading {
            color: #6d7c92;
            font-size: 14px;
            padding: 14px 0;
        }
        @media (max-width: 1200px) {
            .filters-wrap { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
        }
        @media (max-width: 700px) {
            .filters-wrap, .cards { grid-template-columns: 1fr; }
        }
    

        .chart-section {
                margin-top: 22px;
            }

            .chart-filter-bar {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                align-items: center;
                margin-bottom: 14px;
            }

            .chart-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(320px, 1fr));
                gap: 16px;
            }

            .chart-card {
                background: #eef7fb;
                border: 1px solid #d7e9f1;
                border-radius: 14px;
                padding: 16px;
            }

            .chart-card h4 {
                margin: 0 0 14px;
                font-size: 18px;
                color: #215c78;
            }

            .chart-wrap {
                position: relative;
                height: 360px;
            }

    </style>
</head>
<body>
    <div class="dashboard-card">
        <h2>🚀 NOP Dashboard</h2>
        <!-- <p class="subtitle">v2</p> -->

        <div class="filters-wrap">
            <select id="typeFilter" onchange="applyFilters()"></select>
            <select id="yearFilter" onchange="applyFilters()"></select>
            <select id="monthFilter" onchange="applyFilters()"></select>
            <select id="weekFilter" onchange="applyFilters()"></select>
            <input type="date" id="dateFilter" onchange="applyFilters()" />
            <select id="nutritionistFilter" onchange="applyFilters()"></select>
            <button type="button" class="action-btn" onclick="refreshDashboard()">Refresh</button>
            <button type="button" class="action-btn" onclick="exportDashboardReport()">Export</button>
        </div>

        <div class="cards">
            <div class="mini-card">
                <div class="label">Total Sales</div>
                <div class="value" id="cardTotalSales">₹ 0.00</div>
            </div>
            <div class="mini-card">
                <div class="label">Total Net Sales</div>
                <div class="value" id="cardTotalNetSales">₹ 0.00</div>
            </div>
            <div class="mini-card">
                <div class="label">Total Offline Sales</div>
                <div class="value" id="cardTotalOfflineSales">₹ 0.00</div>
            </div>
            <div class="mini-card">
                <div class="label">Grand Total</div>
                <div class="value" id="cardGrandTotal">₹ 0.00</div>
            </div>
        </div>

        <div class="section chart-section">
            <h3>Expert Sales Charts</h3>

            <div class="chart-filter-bar">
                <select id="expertDurationFilter" onchange="renderExpertCharts()">
                    <option value="Top5">Top5</option>
                    <option value="Top10">Top10</option>
                    <option value="Top20">Top20</option>
                    <option value="Top30">Top30</option>
                    <option value="Last5">Last5</option>
                    <option value="Last10">Last10</option>
                    <option value="Last20">Last20</option>
                    <option value="Last50">Last50</option>
                </select>

                <select id="expertYearFilter" onchange="renderExpertCharts()"></select>
                <select id="expertMonthFilter" onchange="renderExpertCharts()"></select>
            </div>

            <div class="chart-grid">
                <div class="chart-card">
                    <h4>Top Experts</h4>
                    <div class="chart-wrap">
                        <canvas id="topExpertsChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <h4>Bottom Experts</h4>
                    <div class="chart-wrap">
                        <canvas id="bottomExpertsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Nutritionist Summary</h3>
            <div id="nutritionistSummary" class="loading">Loading...</div>
        </div>

        <div class="section">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
                <h3 style="margin:0;">Yearly Sales</h3>
                <select id="yearlyYearFilter" onchange="renderYearlyTableFromYearFilter()" style="max-width:180px;">
                </select>
            </div>
            <div id="expertYearlyTable" class="loading">Loading...</div>
        </div>
    </div>

    <script>
let allData = [];
let topExpertsChartInstance = null;
let bottomExpertsChartInstance = null;

const monthOrder = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
];

const monthMapShort = {
    jan:0, feb:1, mar:2, apr:3, may:4, jun:5,
    jul:6, aug:7, sep:8, oct:9, nov:10, dec:11
};

function norm(str) {
    return String(str || "").toLowerCase().replace(/[^a-z0-9]/g, "");
}

function getField(row, candidates) {
    const keys = Object.keys(row || {});
    for (const c of candidates) {
        const target = norm(c);
        const found = keys.find(k => norm(k) === target);
        if (found && row[found] !== undefined && row[found] !== null && row[found] !== "") {
            return row[found];
        }
    }
    return "";
}

function getNumber(val) {
    if (val === null || val === undefined || val === "") return 0;
    return parseFloat(String(val).replace(/,/g, "")) || 0;
}

function formatCurrency(num) {
    return "₹ " + Number(num || 0).toLocaleString("en-IN", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function formatPlain(num) {
    return Number(num || 0).toLocaleString("en-IN", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function escapeHtml(str) {
    return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function parseDate(value) {
    if (!value) return null;

    const str = String(value).trim();

    const iso = new Date(str);
    if (!isNaN(iso.getTime())) return iso;

    const parts = str.split("-");
    if (parts.length === 3) {
        const day = parseInt(parts[0], 10);
        const mon = String(parts[1]).slice(0,3).toLowerCase();
        const year = parseInt(parts[2], 10);
        if (!isNaN(day) && !isNaN(year) && monthMapShort.hasOwnProperty(mon)) {
            return new Date(year, monthMapShort[mon], day);
        }
    }

    return null;
}

function getType(row) {
    let value = getField(row, ["Type", "Order Type", "Sale Type"]);

    if (value) return String(value).trim();

    const keys = Object.keys(row || {});
    const foundKey = keys.find(k => {
        const n = norm(k);
        return n === "type" || n.includes("type");
    });

    if (foundKey && row[foundKey] !== undefined && row[foundKey] !== null) {
        return String(row[foundKey]).trim();
    }

    return "";
}

function getNutritionist(row) {
    return String(getField(row, ["Assigned Nutritionist", "Assigned_Nutritionist", "Nutritionist"])).trim();
}

function getExpert(row) {
    return String(getField(row, ["Expert Name", "Expert", "Assigned Expert", "Assigned_Expert"])).trim();
}

function getDOS(row) {
    return parseDate(getField(row, ["DOS", "Date", "Order Date"]));
}

function getYear(row) {
    const d = getDOS(row);
    return d ? String(d.getFullYear()) : "";
}

function getMonth(row) {
    const explicitMonth = String(getField(row, ["Month"])).trim();
    if (explicitMonth) return explicitMonth;

    const d = getDOS(row);
    return d ? monthOrder[d.getMonth()] : "";
}

function getWeek(row) {
    const d = getDOS(row);
    if (!d) return "";
    const day = d.getDate();
    if (day <= 7) return "Week1";
    if (day <= 14) return "Week2";
    if (day <= 21) return "Week3";
    if (day <= 28) return "Week4";
    return "Week5";
}

function getISODate(row) {
    const d = getDOS(row);
    return d ? d.toISOString().split("T")[0] : "";
}

function getTotalSales(row) {
    return getNumber(getField(row, ["Total Amount", "Total_Amount", "Total Sales", "Total_Sales"]));
}

function getNetSales(row) {
    return getNumber(getField(row, ["Actual Amount", "Actual_Amount", "Net Sales", "Total Net Sales", "Total_Net_Sales"]));
}

function getCommission(row) {
    return getNumber(getField(row, ["Commission", "Total Commission", "Total_Commission"]));
}

async function fetchAllRecords() {
    let merged = [];
    let cursor = null;

    while (true) {
        const config = {
            app_name: "nop-sales-summary",
            report_name: "Sales_Summary_Report",
            max_records: 1000
        };

        if (cursor) config.record_cursor = cursor;

        const res = await ZOHO.CREATOR.DATA.getRecords(config);
        merged = merged.concat(res.data || []);

        if (res.record_cursor) {
            cursor = res.record_cursor;
        } else {
            break;
        }
    }

    return merged;
}

function fillDropdown(id, values, label) {
    const el = document.getElementById(id);
    el.innerHTML = `<option value="">All ${label}</option>`;
    values.forEach(v => {
        el.innerHTML += `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`;
    });
}

function populateFilters() {
    const types = [...new Set(allData.map(r => getType(r).trim()).filter(v => v !== ""))].sort();
    const years = [...new Set(allData.map(r => getYear(r)).filter(v => v !== ""))].sort();
    const months = monthOrder.filter(m =>
        allData.some(r => {
            let month = getMonth(r);
            if (month) {
                const x = month.toLowerCase().slice(0,3);
                month = monthOrder.find(z => z.toLowerCase().startsWith(x)) || "";
            }
            return month === m;
        })
    );
    const nutritionists = [...new Set(allData.map(r => getNutritionist(r).trim()).filter(v => v !== ""))].sort();

    fillDropdown("typeFilter", types, "Type");
    fillDropdown("yearFilter", years, "Year");
    fillDropdown("monthFilter", months, "Month");
    fillDropdown("weekFilter", ["Week1","Week2","Week3","Week4","Week5"], "Week");
    fillDropdown("nutritionistFilter", nutritionists, "Nutritionist");
    fillDropdown("yearlyYearFilter", years, "Year");

    const expertYearFilter = document.getElementById("expertYearFilter");
    const expertMonthFilter = document.getElementById("expertMonthFilter");

    if (expertYearFilter) {
        expertYearFilter.innerHTML = `<option value="">All Year</option>`;
        years.forEach(y => {
            expertYearFilter.innerHTML += `<option value="${escapeHtml(y)}">${escapeHtml(y)}</option>`;
        });
    }

    if (expertMonthFilter) {
        expertMonthFilter.innerHTML = `<option value="">All Month</option>`;
        months.forEach(m => {
            expertMonthFilter.innerHTML += `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`;
        });
    }

    if (years.length) {
        document.getElementById("yearFilter").value = "";
        document.getElementById("yearlyYearFilter").value = years[years.length - 1];

        if (expertYearFilter) {
            expertYearFilter.value = years[years.length - 1];
        }
    }
}

function applyFilters() {
    const type = document.getElementById("typeFilter").value.trim().toLowerCase();
    const year = document.getElementById("yearFilter").value;
    const month = document.getElementById("monthFilter").value;
    const week = document.getElementById("weekFilter").value;
    const date = document.getElementById("dateFilter").value;
    const nutritionist = document.getElementById("nutritionistFilter").value;

    const filtered = allData.filter(row => {
    const rowType = getType(row).trim().toLowerCase();
    const rowYear = getYear(row);

    let rowMonth = getMonth(row);
    if (rowMonth) {
        const x = rowMonth.toLowerCase().slice(0,3);
        rowMonth = monthOrder.find(z => z.toLowerCase().startsWith(x)) || "";
    }

    const rowWeek = getWeek(row);
    const rowDate = getISODate(row);
    const rowNutritionist = getNutritionist(row).trim();

    return (!type || rowType === type) &&
           (!year || rowYear === year) &&
           (!month || rowMonth === month) &&
           (!week || rowWeek === week) &&
           (!date || rowDate === date) &&
           (!nutritionist || rowNutritionist === nutritionist);
});

    renderTopCards(filtered);
    renderNutritionistSummary(filtered);
}

function renderTopCards(data) {
    let totalSales = 0;
    let totalNetSales = 0;
    let totalOfflineSales = 0;

    data.forEach(row => {
        const type = getType(row).toLowerCase();
        const sales = getTotalSales(row);

        if (type === "offline") {
            totalOfflineSales += sales;
        } else {
            const commission = getCommission(row);
            const net = sales - commission;

            totalSales += sales;
            totalNetSales += net;
        }
    });

    const grandTotal = totalNetSales + totalOfflineSales;

    document.getElementById("cardTotalSales").innerText = formatCurrency(totalSales);
    document.getElementById("cardTotalNetSales").innerText = formatCurrency(totalNetSales);
    document.getElementById("cardTotalOfflineSales").innerText = formatCurrency(totalOfflineSales);
    document.getElementById("cardGrandTotal").innerText = formatCurrency(grandTotal);
}

function renderNutritionistSummary(data) {
    const container = document.getElementById("nutritionistSummary");
    const grouped = {};

    data.forEach(row => {
        const name = getNutritionist(row) || "Unassigned";
        if (!grouped[name]) grouped[name] = { sales: 0, net: 0, offline: 0 };

        const type = getType(row).toLowerCase();
        const sales = getTotalSales(row);
        const commission = getCommission(row);

        if (type === "offline") {
            grouped[name].offline += sales;
        } else {
            const net = sales - commission;

            grouped[name].sales += sales;
            grouped[name].net += net;
        }
    });

    const names = Object.keys(grouped).sort();

    if (!names.length) {
        container.innerHTML = `<div class="empty">No data found for selected filters.</div>`;
        return;
    }

    let grandSales = 0;
    let grandNet = 0;
    let grandOffline = 0;
    let grandTotal = 0;

    let html = `
            <div class="table-wrap">
                <table id="nutritionistSummaryTable">
                    <thead>
                        <tr>
                            <th>Nutritionist</th>
                            <th class="number">Contribution %</th>
                            <th class="number">Total Net Sales</th>
                            <th class="number">Total Offline Sales</th>
                            <th class="number">Grand Total</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

    names.forEach(name => {
    const sales = grouped[name].sales;
    const net = grouped[name].net;
    const offline = grouped[name].offline;
    const grand = net + offline;

    grandSales += sales;
    grandNet += net;
    grandOffline += offline;
    grandTotal += grand;
});

names.forEach(name => {
    const sales = grouped[name].sales;
    const net = grouped[name].net;
    const offline = grouped[name].offline;
    const grand = net + offline;
    const pct = grandTotal ? ((grand / grandTotal) * 100).toFixed(2) + "%" : "0.00%";

    html += `
        <tr>
            <td>${escapeHtml(name)}</td>
            <td class="number">${pct}</td>
            <td class="number">${formatCurrency(net)}</td>
            <td class="number">${formatCurrency(offline)}</td>
            <td class="number">${formatCurrency(grand)}</td>
        </tr>
    `;
});

    html += `
            <tr class="total-row">
                <td>Total</td>
                <td class="number">100.00%</td>
                <td class="number">${formatCurrency(grandNet)}</td>
                <td class="number">${formatCurrency(grandOffline)}</td>
                <td class="number">${formatCurrency(grandTotal)}</td>
            </tr>
                </tbody>
            </table>
        </div>
    `;

    container.innerHTML = html;
}

function renderYearlyTableFromYearFilter() {
    const selectedYear = document.getElementById("yearlyYearFilter").value;
    renderYearlyTable(selectedYear);
}

function renderYearlyTable(selectedYear) {
    const container = document.getElementById("expertYearlyTable");

    if (!selectedYear) {
        container.innerHTML = `<div class="empty">Please select a year.</div>`;
        return;
    }

    const yearData = allData.filter(row => getYear(row) === selectedYear);

    const monthly = {};
    monthOrder.forEach(month => {
        monthly[month] = {
            total: 0,
            commission: 0,
            net: 0,
            offline: 0
        };
    });

    yearData.forEach(row => {
        let month = getMonth(row);

        if (month) {
            const m = month.toLowerCase().slice(0, 3);
            month = monthOrder.find(x => x.toLowerCase().startsWith(m)) || "";
        }

        if (!month || !monthly[month]) return;

        const total = getTotalSales(row);
        const type = getType(row).toLowerCase();
        const commission = getCommission(row);

        if (type === "offline") {
            monthly[month].offline += total;
        } else {
            const net = total - commission;

            monthly[month].total += total;
            monthly[month].net += net;
            monthly[month].commission += commission;
        }
    });

    let html = `
        <div class="table-wrap">
            <table id="yearlySalesTable">
                <thead>
                    <tr>
                        <th>Months</th>
                        <th class="number">Total Sales</th>
                        <th class="number">Commission</th>
                        <th class="number">Net Sales</th>
                        <th class="number">Offline Sale</th>
                        <th class="number">Grand Total</th>
                        <th class="number">Difference from Last Month</th>
                    </tr>
                </thead>
                <tbody>
    `;

    let prev = 0;
    let totalSalesAll = 0;
    let totalCommissionAll = 0;
    let totalNetAll = 0;
    let totalOfflineAll = 0;
    let grandTotalAll = 0;

    monthOrder.forEach(month => {
        const m = monthly[month];
        const grand = m.net + m.offline;
        const diff = prev === 0 ? 0 : grand - prev;

        prev = grand;
        totalSalesAll += m.total;
        totalCommissionAll += m.commission;
        totalNetAll += m.net;
        totalOfflineAll += m.offline;
        grandTotalAll += grand;

        html += `
            <tr>
                <td>${month} '${String(selectedYear).slice(-2)}</td>
                <td class="number">${formatPlain(m.total)}</td>
                <td class="number">${formatPlain(m.commission)}</td>
                <td class="number">${formatPlain(m.net)}</td>
                <td class="number">${formatPlain(m.offline)}</td>
                <td class="number">${formatPlain(grand)}</td>
                <td class="number">${formatPlain(diff)}</td>
            </tr>
        `;
    });

    html += `
            <tr class="total-row">
                <td>Total</td>
                <td class="number">${formatPlain(totalSalesAll)}</td>
                <td class="number">${formatPlain(totalCommissionAll)}</td>
                <td class="number">${formatPlain(totalNetAll)}</td>
                <td class="number">${formatPlain(totalOfflineAll)}</td>
                <td class="number">${formatPlain(grandTotalAll)}</td>
                <td></td>
            </tr>
                </tbody>
            </table>
        </div>
    `;

    container.innerHTML = html;
}

function renderExpertCharts() {
    const duration = document.getElementById("expertDurationFilter")?.value || "Top5";
    const selectedYear = document.getElementById("expertYearFilter")?.value || "";
    const selectedMonth = document.getElementById("expertMonthFilter")?.value || "";

    const filtered = allData.filter(row => {
        const rowYear = getYear(row);

        let rowMonth = getMonth(row);
        if (rowMonth) {
            const x = rowMonth.toLowerCase().slice(0,3);
            rowMonth = monthOrder.find(z => z.toLowerCase().startsWith(x)) || "";
        }

        return (!selectedYear || rowYear === selectedYear) &&
               (!selectedMonth || rowMonth === selectedMonth);
    });

    const grouped = {};

    filtered.forEach(row => {
        const expert = getExpert(row) || "Unassigned";
        if (!grouped[expert]) grouped[expert] = 0;
        grouped[expert] += getTotalSales(row);
    });

    const list = Object.keys(grouped).map(name => ({
        name,
        total: grouped[name]
    }));

    const desc = [...list].sort((a,b)=>b.total-a.total);
    const asc = [...list].sort((a,b)=>a.total-b.total);

    let limit = 5;
    if (duration.includes("10")) limit = 10;
    if (duration.includes("20")) limit = 20;
    if (duration.includes("30")) limit = 30;
    if (duration.includes("50")) limit = 50;

    const topData = desc.slice(0, limit);
    const bottomData = asc.slice(0, limit);

    if (topExpertsChartInstance) topExpertsChartInstance.destroy();
    if (bottomExpertsChartInstance) bottomExpertsChartInstance.destroy();

    topExpertsChartInstance = new Chart(document.getElementById("topExpertsChart"), {
        type: "bar",
        data: {
            labels: topData.map(x=>x.name),
            datasets: [{
                data: topData.map(x=>x.total)
            }]
        },
        options: {
            indexAxis: "y",
            plugins: { legend: { display:false } }
        }
    });

    bottomExpertsChartInstance = new Chart(document.getElementById("bottomExpertsChart"), {
        type: "bar",
        data: {
            labels: bottomData.map(x=>x.name),
            datasets: [{
                data: bottomData.map(x=>x.total)
            }]
        },
        options: {
            indexAxis: "y",
            plugins: { legend: { display:false } }
        }
    });
}

async function initDashboard() {
    try {
        document.getElementById("nutritionistSummary").innerHTML = `<div class="loading">Loading summary...</div>`;
        document.getElementById("expertYearlyTable").innerHTML = `<div class="loading">Loading yearly table...</div>`;

        allData = await fetchAllRecords();
        populateFilters();
        applyFilters();
        renderYearlyTableFromYearFilter();
        renderExpertCharts();
    } catch (error) {
        console.log("ERROR:", error);
        document.getElementById("nutritionistSummary").innerHTML = `<div class="empty">Error loading dashboard.</div>`;
        document.getElementById("expertYearlyTable").innerHTML = "";
    }
}

async function refreshDashboard() {
    document.getElementById("nutritionistSummary").innerHTML = `<div class="loading">Refreshing summary...</div>`;
    document.getElementById("expertYearlyTable").innerHTML = `<div class="loading">Refreshing yearly table...</div>`;

    allData = await fetchAllRecords();
    populateFilters();
    applyFilters();
    renderYearlyTableFromYearFilter();
    renderExpertCharts();
}

function convertTableForExcel(table) {
    const cloned = table.cloneNode(true);

    cloned.classList.add("report");

    cloned.querySelectorAll("th.number, td.number").forEach(el => {
        el.classList.remove("number");
        el.classList.add("num");
    });

    cloned.querySelectorAll("tr.total-row").forEach(tr => {
        tr.classList.add("total-row");
    });

    return cloned.outerHTML;
}

    const link = document.createElement("a");

    link.download = "NOP_Dashboard_Report.xls";
