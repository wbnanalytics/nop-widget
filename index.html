<!DOCTYPE html>
<html>
<head>
    <title>NOP Dashboard</title>
    <script src="https://static.zohocdn.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        select { padding: 5px; }
    </style>
</head>
<body>
<div class="card">
    <h2>🚀 NOP Dashboard</h2>

    <div class="filters">
        <select id="typeFilter" onchange="applyFilters()"></select>
        <select id="yearFilter" onchange="applyFilters()"></select>
        <select id="monthFilter" onchange="applyFilters()"></select>
        <select id="nutritionistFilter" onchange="applyFilters()"></select>
    </div>

    <div id="content">
        <p>Loading...</p>
    </div>
</div>

<script>
let allData = [];

ZOHO.CREATOR.DATA.getRecords({
    app_name: "nop-sales-summary",
    report_name: "Sales_Summary_Report"
}).then(function(response) {

    allData = response.data || [];

    console.log("DATA:", allData);

    populateFilters();
    renderSummary(allData);

});


// 🔹 Populate dropdowns
function populateFilters() {

    let years = new Set();
    let months = new Set();
    let types = new Set();
    let nutritionists = new Set();

    allData.forEach(r => {
        if(r.Month) months.add(r.Month);
        if(r.Type) types.add(r.Type);
        if(r.Assigned_Nutritionist) nutritionists.add(r.Assigned_Nutritionist);

        if(r.DOS){
            let year = new Date(r.DOS).getFullYear();
            if(!isNaN(year)) years.add(year);
        }
    });

    fillDropdown("yearFilter", years);
    fillDropdown("monthFilter", months);
    fillDropdown("typeFilter", types);
    fillDropdown("nutritionistFilter", nutritionists);
}


// 🔹 Fill dropdown helper
function fillDropdown(id, values){
    let el = document.getElementById(id);
    el.innerHTML = `<option value="">All</option>`;

    values.forEach(v => {
        el.innerHTML += `<option value="${v}">${v}</option>`;
    });
}


// 🔹 Apply filters
function applyFilters(){

    let year = document.getElementById("yearFilter").value;
    let month = document.getElementById("monthFilter").value;
    let type = document.getElementById("typeFilter").value;
    let nutritionist = document.getElementById("nutritionistFilter").value;

    let filtered = allData.filter(r => {

        let recordYear = r.DOS ? new Date(r.DOS).getFullYear().toString() : "";

        return (!year || recordYear == year) &&
               (!month || r.Month == month) &&
               (!type || r.Type == type) &&
               (!nutritionist || r.Assigned_Nutritionist == nutritionist);
    });

    renderSummary(filtered);
}


// 🔹 Summary (TEMP - next step we improve)
function renderSummary(data){

    let totalSales = 0;

    data.forEach(r => {
        totalSales += parseFloat(r.Total_Amount || 0);
    });

    document.getElementById("content").innerHTML =
        `<b>Total Sales:</b> ₹ ${totalSales.toFixed(2)} 
         <br><b>Total Records:</b> ${data.length}`;
}

</script>


</body>
</html>
