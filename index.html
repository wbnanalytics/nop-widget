<!DOCTYPE html>
<html>
<head>
    <title>NOP Dashboard</title>
    <script src="https://static.zohocdn.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 18px;
            font-family: Arial, sans-serif;
            background: transparent;
            color: #24324a;
        }

        .dashboard-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 10px rgba(25, 42, 70, 0.06);
            border: 1px solid #e8edf5;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .title-block h2 {
            margin: 0;
            font-size: 34px;
            line-height: 1.1;
            color: #14233c;
        }

        .title-block p {
            margin: 8px 0 0;
            color: #66758f;
            font-size: 14px;
        }

        .filters-wrap {
            display: grid;
            grid-template-columns: repeat(6, minmax(120px, 1fr));
            gap: 12px;
            margin: 22px 0 26px;
        }

        select,
        input[type="date"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cfd8e6;
            border-radius: 10px;
            background: #fff;
            color: #23324a;
            font-size: 14px;
            outline: none;
        }

        select:focus,
        input[type="date"]:focus {
            border-color: #5b7cff;
            box-shadow: 0 0 0 3px rgba(91, 124, 255, 0.12);
        }

        .section {
            margin-top: 24px;
        }

        .section h3 {
            margin: 0 0 14px;
            font-size: 20px;
            color: #14233c;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .mini-card {
            background: linear-gradient(180deg, #f8fbff 0%, #f3f7ff 100%);
            border: 1px solid #e3eaf6;
            border-radius: 14px;
            padding: 16px;
        }

        .mini-card .label {
            font-size: 13px;
            color: #6b7a91;
            margin-bottom: 8px;
        }

        .mini-card .value {
            font-size: 26px;
            font-weight: 700;
            color: #162742;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #e3eaf6;
            border-radius: 14px;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            background: #eef4ff;
            color: #294160;
            font-weight: 700;
            font-size: 14px;
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #dde6f3;
        }

        td {
            padding: 11px 10px;
            font-size: 14px;
            border-bottom: 1px solid #edf2f8;
            color: #24324a;
        }

        td.number,
        th.number {
            text-align: right;
            white-space: nowrap;
        }

        tr.total-row td {
            font-weight: 700;
            background: #fff9d8;
        }

        .muted {
            color: #6d7c92;
            font-size: 14px;
        }

        .loading {
            padding: 18px 0;
            color: #6d7c92;
            font-size: 14px;
        }

        .empty {
            padding: 16px 0;
            color: #6d7c92;
            font-size: 14px;
        }

        @media (max-width: 1200px) {
            .filters-wrap {
                grid-template-columns: repeat(3, minmax(120px, 1fr));
            }
        }

        @media (max-width: 700px) {
            .filters-wrap,
            .summary-cards {
                grid-template-columns: 1fr;
            }

            .title-block h2 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <div class="header-row">
            <div class="title-block">
                <h2>🚀 NOP Dashboard</h2>
                <p>Formal one-page summary view for nutritionist and yearly expert reporting.</p>
            </div>
        </div>

        <div class="filters-wrap">
            <select id="typeFilter" onchange="applyFilters()"></select>
            <select id="yearFilter" onchange="applyFilters()"></select>
            <select id="monthFilter" onchange="applyFilters()"></select>
            <select id="weekFilter" onchange="applyFilters()"></select>
            <input type="date" id="dateFilter" onchange="applyFilters()" />
            <select id="nutritionistFilter" onchange="applyFilters()"></select>
        </div>

        <div class="summary-cards" id="topCards">
            <div class="mini-card">
                <div class="label">Filtered Total Sales</div>
                <div class="value" id="cardTotalSales">₹ 0.00</div>
            </div>
            <div class="mini-card">
                <div class="label">Filtered Total Net Sales</div>
                <div class="value" id="cardTotalNetSales">₹ 0.00</div>
            </div>
            <div class="mini-card">
                <div class="label">Selected Data Year</div>
                <div class="value" id="cardYear">-</div>
            </div>
        </div>

        <div class="section">
            <h3>Nutritionist Summary</h3>
            <div id="nutritionistSummary" class="loading">Loading...</div>
        </div>

        <div class="section">
            <h3>Yearly Table</h3>
            <div id="expertYearlyTable" class="loading">Loading...</div>
        </div>
    </div>

    <script>
        let allData = [];

        const monthOrder = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        const monthMap = {
            Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5,
            Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11
        };

        async function fetchAllRecords() {
            let merged = [];
            let cursor = null;

            while (true) {
                const config = {
                    app_name: "nop-sales-summary",
                    report_name: "Sales_Summary_Report",
                    max_records: 1000
                };

                if (cursor) {
                    config.record_cursor = cursor;
                }

                const response = await ZOHO.CREATOR.DATA.getRecords(config);
                const rows = response.data || [];
                merged = merged.concat(rows);

                if (response.record_cursor) {
                    cursor = response.record_cursor;
                } else {
                    break;
                }
            }

            return merged;
        }

        function getNumber(val) {
            if (val === null || val === undefined || val === "") return 0;
            return parseFloat(String(val).replace(/,/g, "")) || 0;
        }

        function formatCurrency(num) {
            return "₹ " + Number(num || 0).toLocaleString("en-IN", {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function formatPlain(num) {
            return Number(num || 0).toLocaleString("en-IN", {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function parseDate(value) {
            if (!value) return null;

            const str = String(value).trim();

            const isoDate = new Date(str);
            if (!isNaN(isoDate.getTime())) return isoDate;

            const parts = str.split("-");
            if (parts.length === 3) {
                const day = parseInt(parts[0], 10);
                const monthText = parts[1];
                const year = parseInt(parts[2], 10);

                if (!isNaN(day) && !isNaN(year) && monthMap.hasOwnProperty(monthText)) {
                    return new Date(year, monthMap[monthText], day);
                }
            }

            return null;
        }

        function getYearFromRow(row) {
            const d = parseDate(row.DOS);
            return d ? String(d.getFullYear()) : "";
        }

        function getWeekLabel(row) {
            const d = parseDate(row.DOS);
            if (!d) return "";

            const day = d.getDate();
            if (day >= 1 && day <= 7) return "Week1";
            if (day >= 8 && day <= 14) return "Week2";
            if (day >= 15 && day <= 21) return "Week3";
            if (day >= 22 && day <= 28) return "Week4";
            return "Week5";
        }

        function getISODateFromRow(row) {
            const d = parseDate(row.DOS);
            if (!d) return "";
            return d.toISOString().split("T")[0];
        }

        function fillDropdown(id, values, label) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">All ${label}</option>`;
            values.forEach(v => {
                el.innerHTML += `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`;
            });
        }

        function populateFilters() {
            const types = [...new Set(allData.map(r => r.Type).filter(Boolean))].sort();
            const years = [...new Set(allData.map(r => getYearFromRow(r)).filter(Boolean))].sort();
            const months = monthOrder.filter(m => allData.some(r => r.Month === m));
            const nutritionists = [...new Set(allData.map(r => r.Assigned_Nutritionist).filter(Boolean))].sort();

            fillDropdown("typeFilter", types, "Type");
            fillDropdown("yearFilter", years, "Year");
            fillDropdown("monthFilter", months, "Month");
            fillDropdown("weekFilter", ["Week1", "Week2", "Week3", "Week4", "Week5"], "Week");
            fillDropdown("nutritionistFilter", nutritionists, "Nutritionist");

            if (years.length) {
                document.getElementById("yearFilter").value = years[years.length - 1];
            }
        }

        function applyFilters() {
            const type = document.getElementById("typeFilter").value;
            const year = document.getElementById("yearFilter").value;
            const month = document.getElementById("monthFilter").value;
            const week = document.getElementById("weekFilter").value;
            const date = document.getElementById("dateFilter").value;
            const nutritionist = document.getElementById("nutritionistFilter").value;

            const filtered = allData.filter(row => {
                return (!type || row.Type === type) &&
                       (!year || getYearFromRow(row) === year) &&
                       (!month || row.Month === month) &&
                       (!week || getWeekLabel(row) === week) &&
                       (!date || getISODateFromRow(row) === date) &&
                       (!nutritionist || row.Assigned_Nutritionist === nutritionist);
            });

            renderTopCards(filtered, year);
            renderNutritionistSummary(filtered);
            renderYearlyTable(filtered, year);
        }

        function renderTopCards(data, selectedYear) {
            let totalSales = 0;
            let totalNetSales = 0;

            data.forEach(row => {
                totalSales += getNumber(row.Total_Amount);
                totalNetSales += getNumber(row.Actual_Amount);
            });

            document.getElementById("cardTotalSales").innerText = formatCurrency(totalSales);
            document.getElementById("cardTotalNetSales").innerText = formatCurrency(totalNetSales);
            document.getElementById("cardYear").innerText = selectedYear || "-";
        }

        function renderNutritionistSummary(data) {
            const container = document.getElementById("nutritionistSummary");

            const grouped = {};

            data.forEach(row => {
                const name = row.Assigned_Nutritionist || "Unassigned";

                if (!grouped[name]) {
                    grouped[name] = {
                        sales: 0,
                        netSales: 0
                    };
                }

                grouped[name].sales += getNumber(row.Total_Amount);
                grouped[name].netSales += getNumber(row.Actual_Amount);
            });

            const names = Object.keys(grouped).sort();

            if (!names.length) {
                container.innerHTML = `<div class="empty">No data found for selected filters.</div>`;
                return;
            }

            let totalSales = 0;
            let totalNet = 0;

            let html = `
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Nutritionist</th>
                                <th class="number">Total Sales</th>
                                <th class="number">Total Net Sales</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            names.forEach(name => {
                const sales = grouped[name].sales;
                const net = grouped[name].netSales;
                totalSales += sales;
                totalNet += net;

                html += `
                    <tr>
                        <td>${escapeHtml(name)}</td>
                        <td class="number">${formatCurrency(sales)}</td>
                        <td class="number">${formatCurrency(net)}</td>
                    </tr>
                `;
            });

            html += `
                    <tr class="total-row">
                        <td>Total</td>
                        <td class="number">${formatCurrency(totalSales)}</td>
                        <td class="number">${formatCurrency(totalNet)}</td>
                    </tr>
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function renderYearlyTable(data, selectedYear) {
            const container = document.getElementById("expertYearlyTable");
            const yearToUse = selectedYear || "";

            if (!yearToUse) {
                container.innerHTML = `<div class="empty">Please select a year.</div>`;
                return;
            }

            const yearData = data.filter(row => getYearFromRow(row) === yearToUse);

            const monthly = {};
            monthOrder.forEach(month => {
                monthly[month] = {
                    onlineSale: 0,
                    commission: 0,
                    netSales: 0,
                    offlineSale: 0,
                    grandTotal: 0
                };
            });

            yearData.forEach(row => {
                const month = row.Month;
                if (!month || !monthly[month]) return;

                const type = String(row.Type || "").toLowerCase();
                const totalAmount = getNumber(row.Total_Amount);
                const actualAmount = getNumber(row.Actual_Amount);
                const commission = getNumber(row.Commission);

                if (type === "online") {
                    monthly[month].onlineSale += totalAmount;
                    monthly[month].commission += commission;
                    monthly[month].netSales += actualAmount;
                } else if (type === "offline") {
                    monthly[month].offlineSale += totalAmount;
                }
            });

            let totalOnline = 0;
            let totalCommission = 0;
            let totalNet = 0;
            let totalOffline = 0;
            let prevGrandTotal = null;

            let html = `
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Months</th>
                                <th class="number">Online Sale</th>
                                <th class="number">Commission</th>
                                <th class="number">Net Sales</th>
                                <th class="number">Offline Sale</th>
                                <th class="number">Grand Total</th>
                                <th class="number">Difference from Last Month</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            monthOrder.forEach(month => {
                const row = monthly[month];
                row.grandTotal = row.netSales + row.offlineSale;

                const diff = prevGrandTotal === null ? 0 : row.grandTotal - prevGrandTotal;
                prevGrandTotal = row.grandTotal;

                totalOnline += row.onlineSale;
                totalCommission += row.commission;
                totalNet += row.netSales;
                totalOffline += row.offlineSale;

                html += `
                    <tr>
                        <td>Total sales in ${month} '${String(yearToUse).slice(-2)}</td>
                        <td class="number">${formatPlain(row.onlineSale)}</td>
                        <td class="number">${formatPlain(row.commission)}</td>
                        <td class="number">${formatPlain(row.netSales)}</td>
                        <td class="number">${formatPlain(row.offlineSale)}</td>
                        <td class="number">${formatPlain(row.grandTotal)}</td>
                        <td class="number">${formatPlain(diff)}</td>
                    </tr>
                `;
            });

            html += `
                    <tr class="total-row">
                        <td>Total</td>
                        <td class="number">${formatPlain(totalOnline)}</td>
                        <td class="number">${formatPlain(totalCommission)}</td>
                        <td class="number">${formatPlain(totalNet)}</td>
                        <td class="number">${formatPlain(totalOffline)}</td>
                        <td class="number">${formatPlain(totalNet + totalOffline)}</td>
                        <td class="number">-</td>
                    </tr>
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        async function initDashboard() {
            try {
                document.getElementById("nutritionistSummary").innerHTML = `<div class="loading">Loading summary...</div>`;
                document.getElementById("expertYearlyTable").innerHTML = `<div class="loading">Loading yearly table...</div>`;

                allData = await fetchAllRecords();
                populateFilters();
                applyFilters();
            } catch (error) {
                console.log(error);
                document.getElementById("nutritionistSummary").innerHTML =
                    `<div class="empty">Error loading dashboard: ${escapeHtml(JSON.stringify(error))}</div>`;
                document.getElementById("expertYearlyTable").innerHTML = "";
            }
        }

        initDashboard();
    </script>
</body>
</html>
