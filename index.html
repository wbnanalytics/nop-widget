<!DOCTYPE html>
<html>
<head>
    <title>NOP Dashboard</title>

    <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        select {
            padding: 5px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🚀 NOP Dashboard</h2>

    <div class="filters">
        <select><option>Type</option></select>
        <select><option>Year</option></select>
        <select><option>Month</option></select>
        <select><option>Week</option></select>
        <select><option>Date</option></select>
        <select><option>Nutritionist</option></select>
    </div>

    <div id="content">
        <p>Data will load here...</p>
    </div>
</div>

<script>
ZOHO.CREATOR.init().then(function() {

    console.log("Widget Loaded");

    ZOHO.CREATOR.API.getAllRecords({
        appName: "wellbeing_nutrition",
        reportName: "Sales_Summary_Report"   // ⚠️ CHANGE THIS
    }).then(function(response) {

        console.log(response);

        document.getElementById("content").innerHTML =
            "Total Records: " + response.data.length;

    });

});
</script>

</body>
</html>
