<!DOCTYPE html>
<html>
<head>
    <title>NOP Dashboard</title>

    <script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            padding: 20px;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>🚀 NOP Dashboard</h2>

    <div class="filters">
        <select><option>Type</option></select>
        <select><option>Year</option></select>
        <select><option>Month</option></select>
        <select><option>Week</option></select>
        <select><option>Date</option></select>
        <select><option>Nutritionist</option></select>
    </div>

    <div id="content">
        <p>Data will load here...</p>
    </div>

</div>

<script>
    ZOHO.CREATOR.init().then(function() {
        console.log("Widget Loaded");
    });
</script>

</body>
</html>
